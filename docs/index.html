<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Eye</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d0d0d; color: #e0e0e0;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 2rem 1rem;
  }
  h1 { font-size: 2rem; margin-bottom: 0.25rem; letter-spacing: -0.5px; }
  .subtitle { color: #888; margin-bottom: 2rem; }
  .card {
    background: #1a1a1a; border: 1px solid #333;
    border-radius: 12px; padding: 2rem;
    max-width: 600px; width: 100%;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
  }
  button {
    padding: 0.75rem 2rem;
    font-size: 1.1rem; font-weight: 600;
    background: #b7f9fed4; color: #fff;
    border: none; border-radius: 8px; cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #9bfffc; }
  button:disabled { background: #444; cursor: not-allowed; }
  #result {
    width: 100%; max-width: 512px;
    border-radius: 8px; border: 1px solid #333;
    display: none;
  }
  #info {
    font-size: 0.85rem; color: #888; text-align: center;
    display: none; line-height: 1.6;
  }
  #status { font-size: 0.85rem; color: #666; }
  .spinner {
    display: none;
    width: 32px; height: 32px;
    border: 3px solid #333; border-top-color: #6c5ce7;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #e74c3c; font-size: 0.9rem; display: none; }
  .progress-wrap {
    display: none; width: 100%; max-width: 350px;
  }
  .progress-row {
    display: flex; align-items: center; gap: 10px;
  }
  .progress-bar {
    flex: 1; height: 6px; background: #333; border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #6c5ce7, #a29bfe);
    width: 0%; border-radius: 3px; transition: width 0.3s ease;
  }
  .progress-pct {
    font-size: 0.85rem; color: #a29bfe; min-width: 36px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .progress-text {
    font-size: 0.8rem; color: #888; margin-top: 0.35rem;
  }
  .local-note {
    text-align: center; font-size: 1.0rem; color: #f3fcfff6; margin-top: 0.5rem;
  }
</style>
</head>
<body>

<h1>&#x1F5A5; Hardware Eye</h1>
<p class="subtitle">Your machine, visualised.</p>

<div class="card">
  <p id="status">Checking connection …</p>
  <button id="genBtn" disabled>Generate</button>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-pct" id="progressPct"></div>
    </div>
    <div class="progress-text" id="progressText"></div>
    <div class="local-note"> running entirely on your hardware...</div>
  </div>
  <p class="error" id="error"></p>
  <img id="result" alt="Generated image">
  <p id="info"></p>
</div>

<script>
const API = "http://127.0.0.1:8000";
const genBtn = document.getElementById("genBtn");
const spinner = document.getElementById("spinner");
const errorEl = document.getElementById("error");
const resultImg = document.getElementById("result");
const infoEl = document.getElementById("info");
const statusEl = document.getElementById("status");
const progressWrap = document.getElementById("progressWrap");
const progressFill = document.getElementById("progressFill");
const progressPct = document.getElementById("progressPct");
const progressText = document.getElementById("progressText");

// check server on load
(async () => {
  try {
    const r = await fetch(API + "/api/status");
    const s = await r.json();
    statusEl.textContent =
      `Server ready  ·  perf=${s.perf_index.toFixed(3)}  ·  ${s.hw_profile.cpu_name}`;
    genBtn.disabled = false;
  } catch {
    statusEl.textContent = "Cannot reach Hardware Eye server. Run: python server.py";
  }
})();

genBtn.onclick = () => {
  genBtn.disabled = true;
  resultImg.style.display = "none";
  infoEl.style.display = "none";
  errorEl.style.display = "none";
  progressWrap.style.display = "block";
  progressFill.style.width = "0%";
  progressText.textContent = "preparing …";

  const evtSource = new EventSource(API + "/api/generate?" + new URLSearchParams({}));

  evtSource.addEventListener("progress", (e) => {
    const d = JSON.parse(e.data);
    progressFill.style.width = d.pct + "%";
    progressPct.textContent = d.pct + "%";
    progressText.textContent = d.msg || "";
  });

  evtSource.addEventListener("done", (e) => {
    const d = JSON.parse(e.data);
    evtSource.close();
    progressWrap.style.display = "none";

    resultImg.src = "data:image/png;base64," + d.image_base64;
    resultImg.style.display = "block";

    infoEl.innerHTML =
      `${d.cpu_brand}${d.gpu_brand ? " + " + d.gpu_brand : ""}  ·  ` +
      `${d.resolution}px  ·  ${d.steps} steps  ·  cfg=${d.guidance_scale.toFixed(1)}  ·  ` +
      `seed=${d.seed}  ·  perf=${d.perf_index.toFixed(3)}`;
    infoEl.style.display = "block";
    genBtn.disabled = false;
  });

  evtSource.addEventListener("error", (e) => {
    try { const d = JSON.parse(e.data); errorEl.textContent = d.msg; } catch {}
    errorEl.style.display = "block";
    evtSource.close();
    progressWrap.style.display = "none";
    genBtn.disabled = false;
  });

  evtSource.onerror = () => {
    evtSource.close();
    progressWrap.style.display = "none";
    genBtn.disabled = false;
  };
};
</script>

</body>
</html>
